version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      dev-dependencies:
        dependency-type: development
    # dompurify is security-sensitive; surface its updates individually
    allow:
      - dependency-type: all

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
